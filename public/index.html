// PÁGINA: CONFIGURAÇÕES
// ============================================================
async function renderConfiguracoes(container) {
  const dados = await store.configuracoes.obter();
  container.innerHTML = `
    <form class="form-panel" id="form-config" style="max-width:480px">
      <h4>Dados da loja</h4>
      <div class="form-field" style="margin-bottom:12px"><label for="c-nome">Nome da loja</label><input id="c-nome" maxlength="80" value="${escapeHtml(dados.nomeLoja)}" /></div>
      <div class="form-field" style="margin-bottom:12px"><label for="c-cnpj">CNPJ</label><input id="c-cnpj" maxlength="18" value="${escapeHtml(dados.cnpj)}" /></div>
      <div class="form-field" style="margin-bottom:12px"><label for="c-telefone">Telefone</label><input id="c-telefone" maxlength="20" value="${escapeHtml(dados.telefone)}" /></div>
      <div class="form-field" style="margin-bottom:16px"><label for="c-email">E-mail</label><input id="c-email" type="email" maxlength="120" value="${escapeHtml(dados.email)}" /></div>
      <button type="submit" class="btn-primary">Salvar alterações</button>
    </form>
  `;
  const campoNome = document.getElementById("c-nome");
  const campoEmail = document.getElementById("c-email");
  limparInvalidoAoDigitar(campoNome, campoEmail);
  document.getElementById("form-config").addEventListener("submit", async (evento) => {
    evento.preventDefault();
    const nomeLoja = campoNome.value.trim();
    const email = campoEmail.value.trim();
    [campoNome, campoEmail].forEach(limparInvalido);

    let valido = true;
    if (!nomeLoja) { marcarInvalido(campoNome); valido = false; }
    if (email && !REGEX_EMAIL.test(email)) { marcarInvalido(campoEmail); valido = false; }
    if (!valido) { mostrarToast("Verifique os campos destacados: nome da loja e e-mail válido."); return; }

    try {
      await store.configuracoes.salvar({
        nomeLoja,
        cnpj: document.getElementById("c-cnpj").value.trim(),
        telefone: document.getElementById("c-telefone").value.trim(),
        email,
      });
      mostrarToast("Configurações salvas.");
    } catch (erro) { mostrarToast(erro.message); }
  });
}

// ============================================================
// MAPA DE PÁGINAS + NAVEGAÇÃO
// ============================================================
const PAGINAS = {
  painel: { titulo: "Painel", subtitulo: "Visão geral da lanchonete", render: renderPainel },
  pedidos: { titulo: "Pedidos", subtitulo: "Acompanhe e filtre os pedidos da cozinha", render: renderPedidos },
  produtos: { titulo: "Produtos", subtitulo: "Catálogo de produtos", render: renderProdutos },
  estoque: { titulo: "Estoque", subtitulo: "Controle de estoque", render: renderEstoque },
  relatorios: { titulo: "Relatórios", subtitulo: "Resumos financeiros de venda", render: renderRelatorios },
  usuarios: { titulo: "Usuários", subtitulo: "Controle de acessos do sistema", render: renderUsuarios },
  configuracoes: { titulo: "Configurações", subtitulo: "Dados da loja", render: renderConfiguracoes },
};

let paginaAtivaId = "painel";

async function atualizarBadgePendentes() {
  const usuario = Auth.obterUsuarioLogado();
  if (!usuario) return; // evita chamadas à API antes do login (causava loop de reload)

  // Só o painel do gerente tem os pedidos embutidos — pra ele, a contagem
  // vai pro Painel. Admin, atendente e cozinha veem um painel sem pedidos
  // (ou não têm painel), então continuam vendo a contagem na aba Pedidos.
  const temPainelComPedidos = usuario.papel === "gerente";
  const badge = document.getElementById(temPainelComPedidos ? "badge-pendentes-painel" : "badge-pendentes-pedidos");
  if (!badge) return;
  const pedidos = await store.pedidos.listar();
  const pendentes = pedidos.filter((p) => p.status === "pendente").length;
  badge.textContent = pendentes;
  badge.classList.toggle("visivel", pendentes > 0);
}

async function atualizarBadgeEstoqueBaixo() {
  if (!Auth.obterUsuarioLogado()) return; // evita chamadas à API antes do login
  const badge = document.getElementById("badge-estoque-baixo");
  if (!badge) return;
  const itensEstoque = await store.estoque.listar();
  const baixos = itensEstoque.filter((i) => i.quantidade < i.estoqueMinimo).length;
  badge.textContent = baixos;
  badge.classList.toggle("visivel", baixos > 0);
}

document.addEventListener("DOMContentLoaded", () => {
  connBanner.init();
  const menuEl = document.getElementById("menu");
  const tituloEl = document.getElementById("page-title");
  const subtituloEl = document.getElementById("page-subtitle");
  const corpoEl = document.getElementById("page-body");

  function irParaPagina(id) {
    const pagina = PAGINAS[id];
    if (!pagina) return;
    
    const usuarioLogado = Auth.obterUsuarioLogado();
    const botaoMenuCorrespondente = document.querySelector(`.menu-item[data-page="${id}"]`);
    if (botaoMenuCorrespondente && botaoMenuCorrespondente.style.display === "none") {
      irParaPagina(usuarioLogado.papel === "cozinha" ? "pedidos" : "painel");
      return;
    }

    paginaAtivaId = id;
    document.querySelectorAll(".menu-item[data-page]").forEach((btn) => btn.classList.toggle("active", btn.dataset.page === id));
    tituloEl.textContent = pagina.titulo;
    subtituloEl.textContent = pagina.subtitulo;
    corpoEl.innerHTML = paginaCarregandoHTML();
    pagina.render(corpoEl);
    atualizarBadgePendentes();
    atualizarBadgeEstoqueBaixo();
    window.location.hash = id;
  }
  window.__irParaPedidos = () => irParaPagina("pedidos");
  window.__irParaEstoque = () => irParaPagina("estoque");

  async function tentarLogin() {
    const btnEntrar = document.getElementById("btn-entrar");
    const campoEmail = document.getElementById("login-email");
    const campoSenha = document.getElementById("login-senha");
    const email = campoEmail.value.trim();
    const senha = campoSenha.value.trim();
    limparInvalido(campoEmail);
    limparInvalido(campoSenha);
    if (!email || !senha) {
      if (!email) marcarInvalido(campoEmail);
      if (!senha) marcarInvalido(campoSenha);
      mostrarToast("Informe e-mail e senha.");
      return;
    }
    if (!REGEX_EMAIL.test(email)) {
      marcarInvalido(campoEmail);
      mostrarToast("Informe um e-mail válido.");
      return;
    }
    btnEntrar.disabled = true;
    const textoOriginal = btnEntrar.textContent;
    btnEntrar.textContent = "Entrando...";
    try {
      const ok = await Auth.login(email, senha);
      if (ok) { inicializarApp(); }
    } finally {
      btnEntrar.disabled = false;
      btnEntrar.textContent = textoOriginal;
    }
  }
  limparInvalidoAoDigitar(document.getElementById("login-email"), document.getElementById("login-senha"));
  document.getElementById("btn-entrar").addEventListener("click", tentarLogin);
  document.getElementById("login-senha").addEventListener("keydown", (evento) => {
    if (evento.key === "Enter") tentarLogin();
  });
  document.getElementById("login-email").addEventListener("keydown", (evento) => {
    if (evento.key === "Enter") tentarLogin();
  });

  function inicializarApp() {
    const usuarioLogado = Auth.obterUsuarioLogado();
    if (!usuarioLogado) return;

    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-interface").style.display = "flex";
    document.getElementById("user-role-badge").textContent = usuarioLogado.papel.toUpperCase();

    Auth.validarAcessoMenu();
    renderIcons();
    atualizarBadgePendentes();
    atualizarBadgeEstoqueBaixo();

    let inicial = window.location.hash.replace("#", "") || "painel";
    if (usuarioLogado.papel === "cozinha") { inicial = "pedidos"; }
    
    irParaPagina(PAGINAS[inicial] ? inicial : "painel");
  }

  menuEl.addEventListener("click", (evento) => {
    const botao = evento.target.closest(".menu-item[data-page]");
    if (botao) irParaPagina(botao.dataset.page);
  });

  document.getElementById("btn-sair").addEventListener("click", () => { Auth.logout(); });

  // Tempo real via Socket.IO — substitui o antigo listener de "storage" entre abas
  socket.on("pedido:novo", async (dados) => {
    atualizarBadgePendentes();
    if (!Auth.obterUsuarioLogado()) return;

    // O servidor pode (ou não) mandar os dados do pedido junto com o evento.
    // Se não mandar, buscamos a lista e pegamos o pedido mais recente para
    // mostrar na notificação (nome do cliente / código do pedido).
    let pedidoNovo = (dados && dados.id) ? dados : null;
    if (!pedidoNovo) {
      try {
        const lista = await store.pedidos.listar();
        pedidoNovo = lista.slice().sort((a, b) => paraDataUTC(b.criadoEm) - paraDataUTC(a.criadoEm))[0] || null;
      } catch (erro) { /* segue sem detalhes do pedido */ }
    }
    // O som toca sempre, não importa a aba em que você está — pra nunca
    // perder um pedido novo. Já o card visual de notificação só aparece
    // na aba Painel, já que a aba Pedidos agora é só pra conferência.
    tocarSomNovoPedido();
    if (paginaAtivaId === "painel") {
      mostrarNotificacaoPedido(pedidoNovo);
    }

    if (paginaAtivaId === "pedidos") {
      renderPedidos(corpoEl);
    } else if (paginaAtivaId === "painel") {
      renderPainel(corpoEl);
    }
  });
  socket.on("pedido:atualizado", () => {
    atualizarBadgePendentes();
    if (paginaAtivaId === "pedidos") renderPedidos(corpoEl);
    if (paginaAtivaId === "painel") renderPainel(corpoEl);
  });
  socket.on("pedido:removido", () => {
    atualizarBadgePendentes();
    if (paginaAtivaId === "pedidos") renderPedidos(corpoEl);
  });
  socket.on("produtos:atualizado", () => {
    if (paginaAtivaId === "produtos") renderProdutos(corpoEl);
  });
  socket.on("estoque:atualizado", () => {
    atualizarBadgeEstoqueBaixo();
    if (paginaAtivaId === "estoque") renderEstoque(corpoEl);
    if (paginaAtivaId === "painel") renderPainel(corpoEl);
  });
  socket.on("configuracoes:atualizada", () => {
    if (paginaAtivaId === "configuracoes") renderConfiguracoes(corpoEl);
  });
  socket.on("caixa:aberto", () => {
    if (paginaAtivaId === "painel") renderPainel(corpoEl);
  });
  socket.on("caixa:fechado", () => {
    if (paginaAtivaId === "painel") renderPainel(corpoEl);
  });

  if (Auth.obterUsuarioLogado()) { inicializarApp(); }
});
</script>
